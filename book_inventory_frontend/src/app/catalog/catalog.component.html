<section class="container-fluid px-0 d-flex flex-column" style="height: 100vh;">

  <!-- Header -->
  <div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-4">
    <div>
      <h1 class="display-6 fw-bold mb-1">Catalog</h1>
      <p class="text-muted mb-0">
        Browse books, stock availability, and author details.
      </p>
    </div>
  </div>

  <!-- Filters -->
  <div class="card mb-3">
    <div class="card-body">
      <div class="row g-3 align-items-end">

        <div class="col-lg-6">
          <label class="form-label" for="search">Search</label>
          <div class="input-group">
            <span class="input-group-text">Search</span>
            <input
              id="search"
              class="form-control"
              type="search"
              [(ngModel)]="searchTerm"
              (ngModelChange)="applyFilters()"
              placeholder="Title, ISBN, author, publisher"
            />
          </div>
        </div>

        <div class="col-lg-4">
          <label class="form-label" for="category">Category</label>
          <select
            id="category"
            class="form-select"
            [(ngModel)]="categoryFilter"
            (ngModelChange)="applyFilters()"
          >
            <option value="">All categories</option>
            <option *ngFor="let category of categories" [value]="category.catId">
              {{ category.categoryName }}
            </option>
          </select>
        </div>

        <div class="col-lg-2 d-grid">
          <button class="btn btn-outline-secondary" type="button" (click)="clearFilters()">
            <span>Clear</span>
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- Alerts -->
  <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
  <div class="alert alert-success" *ngIf="message">{{ message }}</div>

  <!-- Scrollable Catalog -->
  <div class="flex-grow-1 overflow-auto">

    <div class="row g-3" *ngIf="filteredBooks.length; else emptyCatalog">
      <article class="col-md-6 col-xl-4" *ngFor="let book of filteredBooks">

        <app-book-card
          [book]="book"
          [loading]="savingIsbn === book.isbn"
          (add)="addToCart($event)"
        ></app-book-card>

      </article>
    </div>

    <ng-template #emptyCatalog>
      <div class="alert alert-secondary text-center">
        No catalog books match the current filters.
      </div>
    </ng-template>

  </div>

</section>
