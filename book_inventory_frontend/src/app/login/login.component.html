<section class="container-fluid min-vh-100">
  <div class="row min-vh-100">
    <!-- LEFT SIDE (LOGIN FORM) -->
    <div
      class="col-12 col-lg-5 d-flex align-items-center justify-content-center bg-white p-4"
    >
      <div class="card shadow-lg border-0 w-100" style="max-width: 420px">
        <div class="card-body p-4 p-md-5">
          <!-- Heading -->
          <div class="text-center mb-4">
            <h1 class="h3 fw-bold mb-2">Login 📚</h1>
            <p class="text-muted small mb-0">
              Access your book inventory system
            </p>
          </div>

          <!-- Form -->
          <form class="d-grid gap-3" [formGroup]="form" (ngSubmit)="submit()">
            <div class="alert alert-danger py-2" *ngIf="error">{{ error }}</div>
            <div class="alert alert-success py-2" *ngIf="created">
              Account created. Sign in now.
            </div>

            <!-- Username -->
            <div>
              <label class="form-label fw-semibold">Username</label>
              <input
                class="form-control form-control-lg"
                type="text"
                formControlName="username"
                placeholder="Enter username"
                autocomplete="username"
              />
              <small class="text-danger" *ngIf="isInvalid('username')">
                Username is required
              </small>
            </div>

            <!-- Password -->
            <div>
              <label class="form-label fw-semibold">Password</label>
              <input
                class="form-control form-control-lg"
                type="password"
                formControlName="password"
                placeholder="Enter password"
                autocomplete="current-password"
              />
              <small class="text-danger" *ngIf="isInvalid('password')">
                Password is required
              </small>
            </div>

            <!-- Button -->
            <button
              class="btn btn-primary btn-lg w-100 shadow-sm"
              type="submit"
              [disabled]="loading || form.invalid"
            >
              <span *ngIf="!loading">Sign in</span>
              <span *ngIf="loading">
                <span class="spinner-border spinner-border-sm me-2"></span>
                Signing in...
              </span>
            </button>

            <!-- Signup -->
            <div class="text-center mt-2">
              <span class="text-muted small">New user?</span>
              <a
                routerLink="/signup"
                class="fw-semibold ms-1 text-decoration-none"
              >
                Create an account
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE (IMAGE SECTION) -->
    <div
      class="col-lg-7 d-none d-lg-block"
      style="
        background-image: url(&quot;https://images.unsplash.com/photo-1524995997946-a1c2e315a42f&quot;);
        background-size: cover;
        background-position: center;
      "
    >
      <!-- Optional overlay -->
      <div
        class="w-100 h-100 d-flex align-items-center justify-content-center"
        style="background: rgba(0, 0, 0, 0.4)"
      >
        <div class="text-white text-center px-4">
          <h1 class="display-5 fw-bold">Book Inventory System</h1>
          <p class="lead">
            Manage books, stock, and orders efficiently in one place.
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
