<div class="container-fluid">
  <div class="row min-vh-100">
    <aside class="col-12 col-lg-3 col-xl-2 bg-light border-end p-3">
      <div class="d-flex align-items-center gap-3 mb-4">
        <div>
          <div class="fw-bold fs-5">Book Inventory</div>
          <div class="text-muted small">Spring Boot API</div>
        </div>
      </div>

      <div class="text-uppercase text-muted small fw-semibold mb-2">Main</div>
      <nav class="nav nav-pills flex-column gap-1">
        <a
          class="nav-link d-flex align-items-center gap-2 text-dark"
          routerLink="/dashboard"
          routerLinkActive="active"
        >
          <span>Dashboard</span>
        </a>
        <a
          class="nav-link d-flex align-items-center gap-2 text-dark"
          routerLink="/catalog"
          routerLinkActive="active"
        >
          <span>Catalog</span>
        </a>
        <a
          class="nav-link d-flex align-items-center gap-2 text-dark"
          routerLink="/cart"
          routerLinkActive="active"
        >
          <span>Cart</span>
        </a>
      </nav>

      <ng-container *ngIf="isAdmin$ | async">
        <div class="text-uppercase text-muted small fw-semibold mt-4 mb-2">
          Management
        </div>
        <nav class="nav nav-pills flex-column gap-1">
          <a
            class="nav-link d-flex align-items-center gap-2 text-dark"
            routerLink="/manage-books"
            routerLinkActive="active"
          >
            <span>Manage Books</span>
          </a>
          <a
            *ngFor="let resource of adminResources"
            class="nav-link d-flex align-items-center gap-2 text-dark"
            [routerLink]="['/manage', resource.key]"
            routerLinkActive="active"
          >
            <span>{{ resource.title }}</span>
          </a>
        </nav>
      </ng-container>
    </aside>

    <main class="col p-0">
      <header
        class="d-flex align-items-center justify-content-between gap-3 border-bottom bg-white px-3 py-2 shadow-sm"
      >
        <!-- LEFT SIDE (USER INFO) -->
        <div
          class="d-flex align-items-center gap-3"
          *ngIf="authState$ | async as auth"
        >
          <!-- AVATAR -->
          <div
            class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
            style="width: 40px; height: 40px; font-weight: 600"
          >
            {{ auth.username ? auth.username.charAt(0).toUpperCase() : "U" }}
          </div>

          <!-- USER INFO -->
          <div>
            <div class="fw-semibold">
              {{ auth.username || "Signed in" }}
            </div>

            <!-- ROLES AS BADGES -->
            <div class="d-flex gap-1 flex-wrap mt-1">
              <span
                *ngFor="let role of auth.roles"
                class="badge rounded-pill"
                [ngClass]="
                  role.toUpperCase().includes('ADMIN')
                    ? 'bg-danger-subtle text-danger'
                    : 'bg-secondary-subtle text-secondary'
                "
              >
                {{ role }}
              </span>
            </div>
          </div>
        </div>

        <!-- RIGHT SIDE (LOGOUT) -->
        <button
          class="btn btn-outline-danger btn-sm px-3"
          type="button"
          (click)="logout()"
        >
          Logout
        </button>
      </header>

      <div class="p-3 p-lg-4">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
